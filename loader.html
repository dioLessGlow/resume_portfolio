<div class="loader">
    <svg id="logo-anim" viewBox="0 0 300 120">
    <defs>
        <clipPath id="clip-path-c">
            <path d="M40,30 h50 v60 h-50 Z" />
        </clipPath>
    </defs>
    
    <!-- C 字母 -->
    <g id="c">
        <path id="c-path" d="M75,45 a25,25 0 1,0 0,35 a25,25 0 1,0 0,-35" fill="none" stroke="#2d7a2d" stroke-width="12" stroke-linecap="round" />
    </g>
    
    <!-- S 字母 -->
    <g id="s">
        <path id="s-path" d="M130,50 a20,20 0 1,1 0,0.1 M130,80 a20,20 0 1,0 0,0.1" fill="none" stroke="#2d7a2d" stroke-width="12" stroke-linecap="round" />
    </g>
    
    <!-- H 字母 -->
    <g id="h">
        <path id="h-path" d="M180,30 v35 M210,30 v35 M180,52.5 h30" fill="none" stroke="#2d7a2d" stroke-width="12" stroke-linecap="round" />
    </g>
</svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
// 简化版动画 - 无需付费插件
document.addEventListener('DOMContentLoaded', function() {
    const tl = gsap.timeline();
    
    // C 字母 - 从左上飞入 + 弹跳
    tl.from('#c', {
        x: -80,
        y: -40,
        opacity: 0,
        duration: 0.5,
        ease: 'back.out(1.7)'
    })
    
    // S 字母 - 描边动画
    .from('#s-path', {
        strokeDasharray: 200,
        strokeDashoffset: 200,
        duration: 0.6,
        ease: 'power2.out'
    }, '-=0.3')
    .from('#s', {
        scale: 0,
        opacity: 0,
        duration: 0.4,
        ease: 'back.out(2)'
    }, '-=0.5')
    
    // H 字母 - 从右上飞入 + 弹跳
    .from('#h', {
        x: 80,
        y: -40,
        opacity: 0,
        duration: 0.5,
        ease: 'back.out(1.7)'
    }, '-=0.3');
});
</script>
