<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | 陈少辉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Space+Grotesk:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/welcome.css">
    <link rel="stylesheet" href="css/loader.css">
</head>

<body>
    <!-- Loader立即显示 -->
    <div id="loader-container" style="position:fixed;inset:0;background:#fdfbf7;display:flex;align-items:center;justify-content:center;z-index:10000;transition:opacity 0.5s,visibility 0.5s;">
        <div style="font-family:'ZCOOL KuaiLe';font-size:86px;font-weight:bold;color:#2d7a2d;display:flex;gap:20px;">
            <span style="opacity:0;animation:bounceInLeft 0.8s ease-out forwards;animation-delay:0s;">C</span>
            <span style="opacity:0;animation:bounceInTop 0.8s ease-out forwards;animation-delay:0.2s;">S</span>
            <span style="opacity:0;animation:bounceInRight 0.8s ease-out forwards;animation-delay:0.4s;">H</span>
        </div>
        <style>
            @keyframes bounceInLeft {0%{opacity:0;transform:translateX(-80px)}60%{opacity:1;transform:translateX(10px)}80%{transform:translateX(-5px)}100%{opacity:1;transform:translateX(0)}}
            @keyframes bounceInTop {0%{opacity:0;transform:translateY(-80px)}60%{opacity:1;transform:translateY(10px)}80%{transform:translateY(-5px)}100%{opacity:1;transform:translateY(0)}}
            @keyframes bounceInRight {0%{opacity:0;transform:translateX(80px)}60%{opacity:1;transform:translateX(-10px)}80%{transform:translateX(5px)}100%{opacity:1;transform:translateX(0)}}
        </style>
    </div>
    <script>
        // 3秒后隐藏loader
        setTimeout(function() {
            var loader = document.getElementById('loader-container');
            if (loader) {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                loader.style.pointerEvents = 'none';
            }
        }, 3000);
    </script>
    
    <!-- 漂浮的彩色圆球 -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <div class="welcome-content">
        <h1 class="welcome-text">欢迎来到我的</h1>
        <h1 class="welcome-text">小世界<img src="images/icons/欢迎.png" alt="欢迎" class="welcome-icon"></h1>
        <p class="sub-text">这里记录了我的成长</p>
        <p class="hint">Click below to enter →</p>

        <a href="index.html" class="enter-btn" onclick="sessionStorage.setItem('visited', 'true'); return true;">
            <span>请进</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <div class="decoration">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <script src="js/components.js"></script>
</body>

</html>
