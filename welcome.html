<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | 陈少辉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Space+Grotesk:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/welcome.css">
</head>

<body>
    <div class="loader">
        <span class="loader-text">CSH</span>
    </div>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="welcome-content">
        <h1 class="welcome-text">欢迎来到我的<br>小世界 👋</h1>
        <p class="sub-text">这里记录了我的成长</p>
        <p class="hint">Click below to enter →</p>

        <a href="index.html" class="enter-btn">
            <span>请进</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <div class="decoration">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.querySelector('.loader');
            setTimeout(() => loader.classList.add('hidden'), 2000);
        });
    </script>
</body>

</html>
