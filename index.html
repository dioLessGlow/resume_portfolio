    <!-- SVG动画 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const avatar = document.querySelector('.avatar-svg');
            if (!avatar) return;
            
            // 设置初始状态（从下方弹入）
            gsap.set(avatar, { y: 100 });
            
            // 人物弹入动画 - 弹跳效果
            gsap.to(avatar, {
                duration: 1.8,
                y: 0,
                ease: 'bounce.out'
            });
            
            // 头部弹入动画
            gsap.from('.avatar-svg .head', {
                duration: 1,
                y: 20,
                ease: 'elastic.out(0.8, 0.3)',
                delay: 0.2
            });
            
            // 耳朵弹入动画
            gsap.from('.avatar-svg .ear', {
                duration: 0.8,
                scale: 0,
                ease: 'elastic.out(1, 0.5)',
                delay: 0.3,
                stagger: 0.1
            });
            
            // 眼睛弹入动画
            gsap.from('.avatar-svg .eye', {
                duration: 0.6,
                scaleY: 0,
                ease: 'elastic.out(1, 0.5)',
                delay: 0.4
            });
            
            // 眨眼动画 - 每4秒眨一次
            setInterval(function() {
                gsap.to('.avatar-svg .eye', {
                    duration: 0.08,
                    scaleY: 0.1,
                    transformOrigin: 'center center',
                    yoyo: true,
                    repeat: 1
                });
            }, 4000);
            
            // 鼠标移动时脸部跟随
            const face = document.querySelector('.avatar-svg .face');
            const eyes = document.querySelectorAll('.avatar-svg .eye');
            
            if (face) {
                avatar.addEventListener('mousemove', function(e) {
                    const rect = avatar.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    
                    gsap.to(face, {
                        duration: 0.4,
                        x: x * 8,
                        y: y * 8,
                        ease: 'power2.out'
                    });
                    
                    gsap.to(eyes, {
                        duration: 0.4,
                        x: x * 4,
                        ease: 'power2.out'
                    });
                });
                
                avatar.addEventListener('mouseleave', function() {
                    gsap.to([face, eyes], {
                        duration: 0.5,
                        x: 0,
                        y: 0,
                        ease: 'power2.out'
                    });
                });
            }
        });
    </script>
