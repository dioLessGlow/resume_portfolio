    <script>
        // 打字机效果
        let typewriterTimer = null;
        
        function typeText(element, text, speed = 50) {
            // 清除之前的计时器
            if (typewriterTimer) {
                clearTimeout(typewriterTimer);
                typewriterTimer = null;
            }
            
            element.innerHTML = '<span></span>';
            element.classList.add('active');
            
            const span = element.querySelector('span');
            let index = 0;

            function type() {
                if (index < text.length) {
                    // 检查是否是 <br> 标签
                    if (text.substr(index, 4) === '<br>') {
                        span.innerHTML += '<br>';
                        index += 4;
                    } else {
                        span.innerHTML += text[index];
                        index++;
                    }
                    typewriterTimer = setTimeout(type, speed);
                }
            }
            type();
        }

        // 卡片悬停事件 - 按钮下方打字
        const globalTypewriter = document.querySelector('.typewriter-info');
        document.querySelectorAll('.hex-card').forEach(card => {
            card.addEventListener('mouseenter', function () {
                const line1 = this.dataset.line1;
                const line2 = this.dataset.line2;
                if (globalTypewriter) {
                    if (line1 && line2) {
                        typeText(globalTypewriter, line1 + "<br>" + line2, 40);
                    } else if (this.dataset.info) {
                        typeText(globalTypewriter, this.dataset.info, 40);
                    }
                }
            });

            card.addEventListener('mouseleave', function () {
                if (typewriterTimer) {
                    clearTimeout(typewriterTimer);
                    typewriterTimer = null;
                }
                if (globalTypewriter) {
                    globalTypewriter.innerHTML = '<span></span>';
                    globalTypewriter.classList.remove('active');
                }
            });
        });

        setTimeout(function () {
            console.log('Page loaded');
        }, 1000);

        // ===== 头像动画 =====
        gsap.registerPlugin(CustomEase);

        const meTl = gsap.timeline({ delay: 0.5 });

        gsap.set(".bg", { transformOrigin: "50% 50%" });
        gsap.set(".ear-right", { transformOrigin: "0% 50%" });
        gsap.set(".ear-left", { transformOrigin: "100% 50%" });
        gsap.set(".me", { opacity: 1 });

        meTl
            .from(".me", {
                duration: 1,
                yPercent: 100,
                ease: "elastic.out(0.5, 0.4)"
            }, 0.5)
            .from(".head, .hair-front, .shadow", {
                duration: 0.9,
                yPercent: 20,
                ease: "elastic.out(0.58, 0.25)"
            }, 0.6)
            .from(".ear-right", {
                duration: 1,
                rotate: 40,
                yPercent: 10,
                ease: "elastic.out(0.5, 0.2)"
            }, 0.7)
            .from(".ear-left", {
                duration: 1,
                rotate: -40,
                yPercent: 10,
                ease: "elastic.out(0.5, 0.2)"
            }, 0.7)
            .from(".eyebrow_right, .eyebrow_left", {
                duration: 1,
                yPercent: 300,
                ease: "elastic.out(0.5, 0.2)"
            }, 0.7);

        // 眨眼动画
        const blink = gsap.timeline({
            repeat: -1,
            repeatDelay: 5,
            paused: true
        });

        blink.to(".eye-left, .eye-right", {
            duration: 0.01,
            opacity: 0
        }, 0)
        .to(".eye-left, .eye-right", {
            duration: 0.01,
            opacity: 1
        }, 0.15);

        // 3秒后开始眨眼
        setTimeout(() => blink.play(), 3000);

        // 眼睛跟随鼠标
        const svg = document.querySelector('.avatar-svg');
        const eyeLeft = document.querySelector('.eye-left');
        const eyeRight = document.querySelector('.eye-right');
        
        if (svg && eyeLeft && eyeRight) {
            document.addEventListener('mousemove', (e) => {
                const rect = svg.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const svgWidth = rect.width;
                const svgHeight = rect.height;
                
                // 归一化
                const moveX = ((mouseX / svgWidth) - 0.5) * 2;
                const moveY = ((mouseY / svgHeight) - 0.5) * 2;
                
                // 限制范围：左/上更大
                const minX = -1;  // 左边范围更大
                const maxX = 1;
                const minY = -2;  // 上边范围更大
                const maxY = 0.5;
                
                const clampedMoveX = Math.max(minX, Math.min(maxX, moveX));
                const clampedMoveY = Math.max(minY, Math.min(maxY, moveY));
                
                const maxMove = 3;

                gsap.to(eyeLeft, {
                    x: clampedMoveX * maxMove,
                    y: clampedMoveY * maxMove,
                    duration: 0.1
                });
                
                gsap.to(eyeRight, {
                    x: clampedMoveX * maxMove,
                    y: clampedMoveY * maxMove,
                    duration: 0.1
                });
            });
        }
    </script>
